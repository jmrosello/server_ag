<!DOCTYPE html>
<html>
<head>
	<title>Bienvenido a tu nuevo espacio web</title>
<style>
body, html {
  height: 100%;
  margin: 0;
}

.bgimg {
  background-image: url('https://whservers.net/tu-nuevo-espacio-de-web-hosting.jpg');

}

  margin: auto;
  width: 40%;
}
</style>
</head>
<body>

<div class="bgimg">
  <div class="middle">

  </div>

  </div>
</div>

</body>
</html>
